name: Quarterly Data Pipeline

on:
  # Runs on Jan 1, May 1, and Sep 1 at midnight UTC (~every 4 months)
  schedule:
    - cron: "0 0 1 1,5,9 *"
  # Allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push the resulting CSVs back to the repo

    steps:
      # ------------------------------------------------------------------ #
      # 1. Checkout                                                          #
      # ------------------------------------------------------------------ #
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ------------------------------------------------------------------ #
      # 2. Set up Python                                                     #
      # ------------------------------------------------------------------ #
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # ------------------------------------------------------------------ #
      # 3. Install dependencies                                              #
      # ------------------------------------------------------------------ #
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ------------------------------------------------------------------ #
      # 4. Download Nifty 100 constituent list                               #
      # ------------------------------------------------------------------ #
      - name: Download Nifty 100 list
        run: python scripts/download_nifty100.py

      # ------------------------------------------------------------------ #
      # 5. Fetch quarterly financials for all Nifty 100 companies            #
      # ------------------------------------------------------------------ #
      - name: Fetch quarterly financials
        run: python scripts/fetch_quarterly_financials.py

      # ------------------------------------------------------------------ #
      # 6. Commit and push results                                           #
      # ------------------------------------------------------------------ #
      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          # Only commit if there is something new
          git diff --cached --quiet || git commit -m "chore: quarterly data update $(date -u +'%Y-%m-%d')"

      - name: Push changes
        uses: ad-m/github-push-action@v0.8.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref_name }}
